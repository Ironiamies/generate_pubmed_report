name: PubMed Biohacker Report

on:
  schedule:
    # Ajaa joka aamu klo 03:30 UTC, joka on klo 06:30 Suomen kesäaikaa (EEST)
    - cron: '30 3 * * *'
  workflow_dispatch: # Mahdollistaa manuaalisen testauksen GitHubin käyttöliittymästä

jobs:
  run-pubmed-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pyTelegramBotAPI google-genai urllib3

      - name: Run PubMed Report Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python PubMed_Report.py
